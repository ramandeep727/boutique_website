<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Shabnam Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .profile-container { padding: 4rem 2rem; max-width: 1000px; margin: 0 auto; }
        .profile-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--color-border); padding-bottom: 1.5rem; margin-bottom: 2rem; }
        .profile-title { font-family: var(--font-heading); color: var(--color-accent); font-size: 2rem; }
        .order-card { background: white; border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: var(--shadow-sm); }
        .order-header { display: flex; justify-content: space-between; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--color-border); }
        .order-items { display: flex; flex-direction: column; gap: 1rem; }
        .order-item { display: flex; gap: 1rem; align-items: center; }
        .order-item img { width: 60px; height: 60px; object-fit: cover; border-radius: var(--radius-sm); border: 1px solid var(--color-border); }
        .order-status { font-weight: 600; color: #2e7d32; display: inline-block; padding: 0.2rem 0.6rem; background: #e8f5e9; border-radius: 4px; font-size: 0.85rem; margin-top: 0.3rem;}
    </style>
</head>
<body style="background: var(--color-bg-light); font-family: var(--font-body);">
    <header style="background: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--color-border); position: sticky; top:0; z-index: 100;">
        <a href="index.html" class="logo" style="text-decoration:none; display:flex; align-items:center; gap:0.5rem; font-family:var(--font-heading); font-size:1.5rem; font-weight:700; color:var(--color-accent);">
            <span class="logo-icon" style="color:var(--color-primary);"><i class="ph ph-flower-lotus"></i></span>
            Shabnam<span class="logo-dot" style="color:var(--color-primary);">.</span>
        </a>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <a href="index.html" style="text-decoration:none; color:var(--color-text-light); font-size: 0.9rem;"><i class="ph ph-arrow-left"></i> Back to Store</a>
            <a href="#" onclick="logout()" style="text-decoration:none; color:var(--color-primary); font-weight:500; border: 1px solid var(--color-primary); padding: 0.4rem 1rem; border-radius: 50px;">Logout</a>
        </div>
    </header>

    <main class="profile-container">
        <div class="profile-header">
            <div>
                <h1 class="profile-title">My Orders</h1>
                <p style="color: var(--color-text-light); margin-top: 0.5rem;">Logged in as: <span id="customerEmailDisplay" style="font-weight:600; color:var(--color-primary);"></span></p>
            </div>
        </div>

        <div id="ordersContainer">
            <!-- Orders injected here -->
        </div>
    </main>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="firebase-init.js"></script>

    <script>
        let currentUser = null;

        window.auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('customerEmailDisplay').textContent = user.email;
                renderOrders(user.email);
            } else {
                window.location.href = 'login.html';
            }
        });

        async function renderOrders(userEmail) {
            const container = document.getElementById('ordersContainer');
            
            let myOrders = [];
            if (window.db) {
                try {
                    const snapshot = await window.db.collection('orders').where('email', '==', userEmail).get();
                    snapshot.forEach(doc => {
                        myOrders.push({ id: doc.id, ...doc.data() });
                    });
                } catch(e) {
                    console.error("Firebase fetch failed", e);
                }
            }
            
            if (myOrders.length === 0) {
                const allOrders = JSON.parse(localStorage.getItem('shabnam_orders')) || [];
                myOrders = allOrders.filter(o => o.email.toLowerCase() === userEmail.toLowerCase());
            }

            if (myOrders.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; padding:4rem 2rem; background:white; border-radius:var(--radius-md); border:1px solid var(--color-border);">
                        <i class="ph ph-shopping-bag" style="font-size:3rem; color:var(--color-text-light); margin-bottom:1rem;"></i>
                        <h3 style="margin-bottom:0.5rem; color:var(--color-text-main);">You have no previous orders.</h3>
                        <p style="color:var(--color-text-light); margin-bottom:1.5rem;">Looks like you haven't made a purchase yet.</p>
                        <a href="index.html" class="btn btn-primary">Start Shopping</a>
                    </div>
                `;
                return;
            }

            myOrders.forEach(order => {
                const card = document.createElement('div');
                card.className = 'order-card';
                
                let itemsHtml = '';
                if(order.items && order.items.length) {
                    order.items.forEach(item => {
                        itemsHtml += `
                            <div class="order-item">
                                <img src="${item.image}" alt="">
                                <div>
                                    <h4 style="font-size:0.95rem; margin-bottom:0.2rem; color:var(--color-text-main);">${item.name}</h4>
                                    <p style="font-size:0.85rem; color:var(--color-text-light);">${item.price}</p>
                                </div>
                            </div>
                        `;
                    });
                }

                card.innerHTML = `
                    <div class="order-header">
                        <div>
                            <p style="font-size:0.85rem; color:var(--color-text-light); margin-bottom:0.2rem;">Order Placed</p>
                            <p style="font-weight:600; color:var(--color-text-main);">${order.date}</p>
                        </div>
                        <div>
                            <p style="font-size:0.85rem; color:var(--color-text-light); margin-bottom:0.2rem;">Total Amount</p>
                            <p style="font-weight:600; color:var(--color-text-main);">${order.total}</p>
                        </div>
                        <div style="text-align:right;">
                            <p style="font-size:0.85rem; color:var(--color-text-light); margin-bottom:0.2rem;">Order ID: ${order.id}</p>
                            <span class="order-status">${order.status || 'Pending'}</span>
                        </div>
                    </div>
                    <div class="order-items">
                        ${itemsHtml}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function logout() {
            try {
                await window.auth.signOut();
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Logout error', error);
            }
        }
    </script>
</body>
</html>
