<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Shabnam Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="admin.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--color-bg-light);
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-box">
            <div class="login-header">
                <div class="logo" style="justify-content: center; margin-bottom: 0.5rem; display:flex; align-items:center; gap:0.5rem; font-family:var(--font-heading); font-size:1.8rem; font-weight:700; color:var(--color-accent);">
                    <span class="logo-icon" style="color:var(--color-primary);"><i class="ph ph-flower-lotus"></i></span>
                    Shabnam<span class="logo-dot" style="color:var(--color-primary);">.</span>
                </div>
                <h2 id="formTitle">Welcome Back</h2>
                <p id="formSubtitle">Sign in to your customer account</p>
            </div>
            
            <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
                <button type="button" id="tabSignIn" class="btn btn-outline active" style="flex:1;">Sign In</button>
                <button type="button" id="tabSignUp" class="btn btn-outline" style="flex:1;">Sign Up</button>
            </div>

            <form id="authForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="jane@example.com" style="width:100%; padding:0.8rem; border:1px solid var(--color-border); border-radius:var(--radius-sm);">
                </div>
                <div class="form-group">
                    <label for="password">Password (Min 6 chars)</label>
                    <input type="password" id="password" required placeholder="Enter password" style="width:100%; padding:0.8rem; border:1px solid var(--color-border); border-radius:var(--radius-sm);" minlength="6">
                </div>
                
                <p id="errorMessage" style="color: red; font-size: 0.85rem; margin-top: 0.5rem; display: none;"></p>
                
                <button type="submit" id="submitBtn" class="btn btn-primary btn-glow" style="width: 100%; margin-top: 1rem;">Sign In</button>
            </form>
            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="index.html" style="color: var(--color-text-light); text-decoration: none; font-size: 0.9rem;"><i class="ph ph-arrow-left"></i> Back to Store</a>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="firebase-init.js"></script>

    <script>
        let isSignUp = false;
        const tabSignIn = document.getElementById('tabSignIn');
        const tabSignUp = document.getElementById('tabSignUp');
        const formTitle = document.getElementById('formTitle');
        const formSubtitle = document.getElementById('formSubtitle');
        const submitBtn = document.getElementById('submitBtn');
        const errorMessage = document.getElementById('errorMessage');

        tabSignIn.addEventListener('click', () => {
            isSignUp = false;
            tabSignIn.style.background = 'var(--color-bg-alt)';
            tabSignIn.style.borderColor = 'var(--color-primary)';
            tabSignUp.style.background = 'transparent';
            tabSignUp.style.borderColor = 'var(--color-border)';
            formTitle.textContent = 'Welcome Back';
            formSubtitle.textContent = 'Sign in to your customer account';
            submitBtn.textContent = 'Sign In';
            errorMessage.style.display = 'none';
        });

        tabSignUp.addEventListener('click', () => {
            isSignUp = true;
            tabSignUp.style.background = 'var(--color-bg-alt)';
            tabSignUp.style.borderColor = 'var(--color-primary)';
            tabSignIn.style.background = 'transparent';
            tabSignIn.style.borderColor = 'var(--color-border)';
            formTitle.textContent = 'Create Account';
            formSubtitle.textContent = 'Join Shabnam Boutique today';
            submitBtn.textContent = 'Sign Up';
            errorMessage.style.display = 'none';
        });

        // initial style
        tabSignIn.style.background = 'var(--color-bg-alt)';
        tabSignIn.style.borderColor = 'var(--color-primary)';

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            errorMessage.style.display = 'none';
            submitBtn.textContent = 'Processing...';
            submitBtn.disabled = true;

            try {
                if (isSignUp) {
                    await window.auth.createUserWithEmailAndPassword(email, password);
                } else {
                    await window.auth.signInWithEmailAndPassword(email, password);
                }
                window.location.href = 'profile.html';
            } catch (error) {
                errorMessage.textContent = error.message;
                errorMessage.style.display = 'block';
                submitBtn.textContent = isSignUp ? 'Sign Up' : 'Sign In';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
